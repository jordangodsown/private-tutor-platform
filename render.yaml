services:
  - type: web
    name: private-tutor-platform
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: private-tutor-db
          property: connectionString

databases:
  - name: private-tutor-db
    engine: postgresql
    plan: starter
    version: 15
